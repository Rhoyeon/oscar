  /* Main graph area */

  if (activeGroups.has(name)) { activeGroups.delete(name); el.classList.add('inactive'); }

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d => d.id).distance(90).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-280))
  .force('center', d3.forceCenter(0, 0))
  .force('collision', d3.forceCollide(20));

function buildGraph() {
  const container = document.getElementById('graph-container');
  const W = container.clientWidth, H = container.clientHeight;
  sim.force('center', d3.forceCenter(W/2, H/2));

  // Links
  linkSel = g.select('g').selectAll('line').data(edges).join('line')
    .attr('stroke', '#3a3d52')
    .attr('stroke-width', d => 0.5 + d.weight)
    .attr('marker-end', 'url(#arrow)');

  // Edge labels (relation)
  g.select('g').selectAll('.edge-label').data(edges).join('text')
    .attr('class', 'edge-label')
    .attr('text-anchor', 'middle')
    .attr('font-size', 9)
    .attr('fill', '#4a4d62')
    .text(d => d.relation_label);

  // Nodes
  const nodeEnter = g.selectAll('.node-g').data(nodes, d => d.id).join('g')
    .attr('class', 'node-g')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('click', (e, d) => showDetail(d))
    .on('mouseover', (e, d) => showTooltip(e, d))
    .on('mousemove', (e) => moveTooltip(e))
    .on('mouseout', hideTooltip);

  circleSel = nodeEnter.append('circle')
    .attr('r', d => {
      const deg = (adj[d.id]?.out.length||0) + (adj[d.id]?.in.length||0);
      return Math.max(7, Math.min(20, 7 + deg * 1.2));
    })
    .attr('fill', d => d.color || '#76B7B2')
    .attr('stroke', '#0f1117')
    .attr('stroke-width', 1.5);

  labelSel = nodeEnter.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => {
      const deg = (adj[d.id]?.out.length||0) + (adj[d.id]?.in.length||0);
      return -(Math.max(7, Math.min(20, 7 + deg * 1.2)) + 4);
    })
    .attr('font-size', 11)
    .attr('fill', '#ccc')
    .text(d => d.label.length > 18 ? d.label.slice(0,16)+'…' : d.label);

  sim.on('tick', () => {
    linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
           .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    g.selectAll('.edge-label')
      .attr('x', d => (d.source.x + d.target.x)/2)
      .attr('y', d => (d.source.y + d.target.y)/2);
    g.selectAll('.node-g').attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));
}

function updateVisibility() {
  let visible = 0;
  g.selectAll('.node-g').each(function(d) {
    const v = nodeVisible(d);
    d3.select(this).attr('opacity', v ? 1 : 0.07);
    if (v) visible++;
  });
  linkSel?.each(function(d) {
    const v = nodeVisible(nodeById[d.source.id||d.source]) && nodeVisible(nodeById[d.target.id||d.target]);
    d3.select(this).attr('opacity', v ? 0.6 : 0.03);
  });
  document.getElementById('s-visible').textContent = visible;
}

function showDetail(d) {
  const outEdges = adj[d.id]?.out || [];
  const inEdges = adj[d.id]?.in || [];
  let html = `<div class="detail-label">${d.label}</div>`;
  html += `<div class="detail-class">${d.class_label || d.class} · ${d.root_class}</div>`;
  if (d.properties) {
    Object.entries(d.properties).forEach(([k, v]) => {
      if (v && k !== 'entity_type_raw') {
        html += `<div class="detail-prop"><span class="detail-prop-key">${k}</span><span class="detail-prop-val">${v}</span></div>`;
      }
    });
  }
  if (outEdges.length) {
    html += `<div class="detail-edges"><div style="font-size:11px;color:#666;margin-bottom:6px;margin-top:8px;">→ 연결 (${outEdges.length})</div>`;
    outEdges.forEach(e => {
      const tgt = nodeById[e.target.id||e.target];
      html += `<div class="detail-edge"><div class="detail-edge-rel">${e.relation_label}</div><div class="detail-edge-target">${tgt?.label || e.target}</div></div>`;
    });
    html += '</div>';
  }
  if (inEdges.length) {
    html += `<div class="detail-edges"><div style="font-size:11px;color:#666;margin-bottom:6px;margin-top:8px;">← 참조됨 (${inEdges.length})</div>`;
    inEdges.forEach(e => {
      const src = nodeById[e.source.id||e.source];
      html += `<div class="detail-edge"><div class="detail-edge-rel">${e.relation_label}</div><div class="detail-edge-target">${src?.label || e.source}</div></div>`;
    });
    html += '</div>';
  }
  document.getElementById('detail-content').innerHTML = html;

  // Highlight
  g.selectAll('.node-g').each(function(n) {
    const connected = n.id === d.id
      || outEdges.some(e => (e.target.id||e.target) === n.id)
      || inEdges.some(e => (e.source.id||e.source) === n.id);
    d3.select(this).attr('opacity', connected ? 1 : 0.15);
  });
  linkSel.attr('opacity', e => {
    const sid = e.source.id||e.source, tid = e.target.id||e.target;
    return (sid === d.id || tid === d.id) ? 1 : 0.05;
  });
}

function showTooltip(e, d) {
  document.getElementById('tt-label').textContent = d.label;
  document.getElementById('tt-class').textContent = `${d.class_label} · degree ${(adj[d.id]?.out.length||0)+(adj[d.id]?.in.length||0)}`;
  document.getElementById('tooltip').style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 12) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function resetZoom() {
  svg.transition().duration(500).call(
    d3.zoom().transform, d3.zoomIdentity.translate(0,0).scale(1)
  );
}
function toggleLabels() {
  showLabels = !showLabels;
  g.selectAll('.node-g text').attr('display', showLabels ? null : 'none');
}
function reheat() { sim.alpha(0.5).restart(); }

buildGraph();
updateVisibility();
</script>
</body>
</html>
